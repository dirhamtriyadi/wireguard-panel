server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: let React Router handle client-side routes (e.g. /trash).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively; index.html stays uncached.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
