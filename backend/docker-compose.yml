services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wg_panel
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    # WireGuard needs to create a netlink device and bind the listen port on the host.
    # host networking + NET_ADMIN is the simplest reliable setup. The host kernel
    # must have the wireguard module available.
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      SERVER_PORT: 8083
      GIN_MODE: release
      DB_HOST: localhost
      DB_PORT: 5434
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: wg_panel
      DB_SSLMODE: disable
      DEFAULT_ENDPOINT: ${DEFAULT_ENDPOINT:-vpn.example.com}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173}
      # Admin login. Change the password before exposing the panel; an empty
      # password locks the whole API. Set a long random AUTH_TOKEN_SECRET in
      # production (e.g. `openssl rand -hex 32`) to keep sessions across restarts.
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-change-me}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-}
      AUTH_TOKEN_TTL_HOURS: ${AUTH_TOKEN_TTL_HOURS:-24}

  # Static frontend served by Nginx. The API URL is baked in at build time, so
  # set VITE_API_BASE_URL to a host the browser can reach (not "localhost" if
  # you open the panel from another machine).
  web:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8083/api/v1}
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  pgdata:
